version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    groups:
      github-actions-patch:
        patterns:
          - "*"
        update-types:
          - "patch"
      github-actions-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:10"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 3
    groups:
      root-prod-patch-minor:
        dependency-type: "production"
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
      root-dev-patch-minor:
        dependency-type: "development"
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    groups:
      backend-prod-patch-minor:
        dependency-type: "production"
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
      backend-dev-patch-minor:
        dependency-type: "development"
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:20"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 3
    groups:
      frontend-prod-patch-minor:
        dependency-type: "production"
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
      frontend-dev-patch-minor:
        dependency-type: "development"
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 2

  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:45"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 2
