name: Deploy to EC2

on:
  # Allows manual triggering from the GitHub Actions tab
  workflow_dispatch:
  # Automatic trigger after CI workflows finish
  workflow_run:
    workflows: ["Backend CI", "Frontend CI"]
    types: [completed]
    branches: ["main"]

env:
  AWS_REGION: ap-south-1
  AWS_ACCOUNT_ID: 455162169324

concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: true

jobs:
  approval:
    if: ${{ (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Await production approval
        run: echo "Production approval granted"

  deploy:
    # Logic: Run if manually triggered OR if the triggering workflow was successful
    if: ${{ (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    needs: approval

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to EC2 via SSH
        run: |
          ssh -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_PUBLIC_IP }} \
              "AWS_ACCOUNT_ID=${{ env.AWS_ACCOUNT_ID }} AWS_REGION=${{ env.AWS_REGION }} bash -s" << EOF
            set -euo pipefail

            OLD_BACKEND_IMAGE=$(docker inspect backend --format='{{.Config.Image}}' 2>/dev/null || true)
            OLD_FRONTEND_IMAGE=$(docker inspect frontend --format='{{.Config.Image}}' 2>/dev/null || true)

            rollback() {
              echo "Health check failed. Attempting rollback..."
              if [ -n "$OLD_BACKEND_IMAGE" ] && [ -n "$OLD_FRONTEND_IMAGE" ]; then
                docker rm -f backend frontend || true
                docker run -d --name backend --restart unless-stopped -p 3000:3000 "$OLD_BACKEND_IMAGE"
                docker run -d --name frontend --restart unless-stopped -p 80:80 "$OLD_FRONTEND_IMAGE"
              fi
            }
            
            # 1. Login to ECR
            aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com

            # 2. Pull the latest images
            docker pull ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/devops-backend:latest
            docker pull ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/devops-frontend:latest

            # 3. Stop and remove existing containers
            docker rm -f backend frontend || true

            # 4. Run Backend
            docker run -d \
              --name backend \
              --restart unless-stopped \
              -p 3000:3000 \
              ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/devops-backend:latest

            # 5. Run Frontend
            docker run -d \
              --name frontend \
              --restart unless-stopped \
              -p 80:80 \
              ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/devops-frontend:latest

            # 6. Health checks (backend + frontend)
            sleep 8
            if ! curl -fsS http://localhost:3000/api/hello > /dev/null || ! curl -fsS http://localhost/ > /dev/null; then
              rollback
              exit 1
            fi

            # 7. Cleanup old images to save disk space
            docker image prune -f
          EOF
