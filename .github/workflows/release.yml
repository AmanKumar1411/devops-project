name: Release Build and Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/release.yml"
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  AWS_ACCOUNT_ID: 455162169324

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/devops-backend:latest \
            -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/devops-backend:${{ github.sha }} \
            --push \
            ./backend

  build_frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/devops-frontend:latest \
            -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/devops-frontend:${{ github.sha }} \
            --push \
            ./frontend

  approval:
    needs: [build_backend, build_frontend]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Await production approval
        run: echo "Production approval granted"

  deploy:
    needs: approval
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to EC2 via SSH
        run: |
          ssh -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_PUBLIC_IP }} \
              "AWS_ACCOUNT_ID=${{ env.AWS_ACCOUNT_ID }} AWS_REGION=${{ env.AWS_REGION }} bash -s" << EOF
            set -euo pipefail

            OLD_BACKEND_IMAGE=$(docker inspect backend --format='{{.Config.Image}}' 2>/dev/null || true)
            OLD_FRONTEND_IMAGE=$(docker inspect frontend --format='{{.Config.Image}}' 2>/dev/null || true)

            rollback() {
              echo "Health check failed. Attempting rollback..."
              if [ -n "$OLD_BACKEND_IMAGE" ] && [ -n "$OLD_FRONTEND_IMAGE" ]; then
                docker rm -f backend frontend || true
                docker run -d --name backend --restart unless-stopped -p 3000:3000 "$OLD_BACKEND_IMAGE"
                docker run -d --name frontend --restart unless-stopped -p 80:80 "$OLD_FRONTEND_IMAGE"
              fi
            }

            aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com

            docker pull ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/devops-backend:latest
            docker pull ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/devops-frontend:latest

            docker rm -f backend frontend || true

            docker run -d \
              --name backend \
              --restart unless-stopped \
              -p 3000:3000 \
              ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/devops-backend:latest

            docker run -d \
              --name frontend \
              --restart unless-stopped \
              -p 80:80 \
              ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/devops-frontend:latest

            sleep 8
            if ! curl -fsS http://localhost:3000/api/hello > /dev/null || ! curl -fsS http://localhost/ > /dev/null; then
              rollback
              exit 1
            fi

            docker image prune -f
          EOF
